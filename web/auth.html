<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBuddy - Sign In</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell',
          'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }

      .logo {
        text-align: center;
        font-size: 48px;
        margin-bottom: 16px;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 8px;
        font-size: 28px;
      }

      .tagline {
        text-align: center;
        color: #666;
        margin-bottom: 32px;
        font-size: 14px;
      }

      .sign-in-btn {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .google-btn {
        background: #fff;
        color: #333;
        border: 1px solid #ddd;
      }

      .google-btn:hover {
        background: #f9f9f9;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .guest-btn {
        background: #667eea;
        color: white;
        margin-top: 20px;
      }

      .guest-btn:hover {
        background: #5568d3;
      }

      .loading {
        display: none;
        text-align: center;
        color: #667eea;
      }

      .error {
        display: none;
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin: 16px 0;
        font-size: 14px;
      }

      .success {
        display: none;
        background: #efe;
        color: #3c3;
        padding: 12px;
        border-radius: 8px;
        margin: 16px 0;
        font-size: 14px;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 24px 0;
        color: #999;
      }

      .divider span {
        flex: 1;
        height: 1px;
        background: #ddd;
      }

      .divider p {
        margin: 0 12px;
        font-size: 12px;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: #999;
        margin-top: 24px;
      }

      .footer a {
        color: #667eea;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🥗</div>
      <h1>NutriBuddy</h1>
      <p class="tagline">Your AI-powered nutrition companion</p>

      <div class="error" id="errorMessage"></div>
      <div class="success" id="successMessage"></div>

      <button class="sign-in-btn google-btn" id="googleSignIn">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Sign in with Google
      </button>

      <div class="divider">
        <span></span>
        <p>OR</p>
        <span></span>
      </div>

      <button class="sign-in-btn guest-btn" id="guestSignIn">
        <span>👤</span>
        Continue as Guest
      </button>

      <div class="footer">
        <p id="loadingStatus" class="loading">Signing in...</p>
        <p>By continuing, you agree to our Terms of Service and Privacy Policy</p>
      </div>
    </div>

    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Firebase -->
    <script type="module">
      import {
        auth,
        googleProvider,
        signInWithGoogle,
        signInAnonymously,
      } from './firebase-config.js';
      import { signInWithPopup, signInAnonymously as fbSignInAnonymously } from 'firebase/auth';

      const googleBtn = document.getElementById('googleSignIn');
      const guestBtn = document.getElementById('guestSignIn');
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      const loadingStatus = document.getElementById('loadingStatus');

      function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 5000);
      }

      function showSuccess(message) {
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        loadingStatus.style.display = 'none';
      }

      function showLoading() {
        loadingStatus.style.display = 'block';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
      }

      googleBtn.addEventListener('click', async () => {
        showLoading();
        try {
          const result = await signInWithPopup(auth, googleProvider);
          showSuccess('Signed in as ' + result.user.email);
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } catch (error) {
          console.error('Google Sign-In error:', error);

          if (error.code === 'auth/popup-blocked') {
            showError('Sign-in popup was blocked. Please allow popups.');
          } else if (error.code === 'auth/popup-closed-by-user') {
            showError('Sign-in was cancelled.');
          } else {
            showError('Sign-in failed: ' + error.message);
          }
        }
      });

      guestBtn.addEventListener('click', async () => {
        showLoading();
        try {
          const result = await fbSignInAnonymously(auth);
          showSuccess('Guest session started');
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } catch (error) {
          console.error('Guest Sign-In error:', error);
          showError('Guest sign-in failed: ' + error.message);
        }
      });
    </script>
  </body>
</html>
